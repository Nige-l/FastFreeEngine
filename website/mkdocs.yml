site_name: FastFreeEngine
site_description: A performance-first, open-source C++ game engine that runs on old hardware
site_url: https://fastfreeengine.github.io  # placeholder
repo_url: https://github.com/user/FastFreeEngine  # placeholder — update when public repo exists
repo_name: FastFreeEngine

theme:
  name: material
  font: false  # Use system fonts — no Google Fonts CDN dependency
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tutorials:
    - tutorials/index.md
    - "Your First 2D Game": tutorials/first-2d-game.md
    - "Your First 3D Game": tutorials/first-3d-game.md
    - "Multiplayer Basics": tutorials/multiplayer-basics.md
  - API Reference:
    - api/index.md
    - Core: api/core.md
    - Renderer: api/renderer.md
    - Audio: api/audio.md
    - Physics: api/physics.md
    - Scripting: api/scripting.md
    - Networking: api/networking.md
    - Editor: api/editor.md
    - Scene: api/scene.md
  - How It Works:
    - internals/index.md
    - "Entity Component System": internals/ecs.md
    - "The Renderer": internals/renderer.md
    - "Multiplayer Networking": internals/networking.md
  - Learn:
    - learn/index.md
    - "Build an ECS from Scratch": learn/ecs-from-scratch.md
  - Community:
    - community.md
    - "Game Showcase": community/showcase.md
